name: Build Crusheergram APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: |
          if [ ! -f pubspec.yaml ]; then
            flutter create . --overwrite --org com.crusheer --project-name crusheergram
            rm -f lib/main.dart
            mv main.dart lib/
          fi
          flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v3
        with:
          name: crusheergram-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

