name: Build Crusheergram APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: |
          if [ ! -f pubspec.yaml ]; then
            # لحفظ كود فلاتر الأصلي الخاص بك مؤقتاً
            mkdir -p temp_lib
            cp lib/main.dart temp_lib/main.dart
            
            # إنشاء هيكلية المشروع بالكامل
            flutter create . --overwrite --org com.crusheer --project-name crusheergram
            
            # استعادة كودك الأصلي ووضعه في مكانه الصحيح المتكامل
            rm -f lib/main.dart
            mv temp_lib/main.dart lib/main.dart
            rm -rf temp_lib
          fi
          
          # إضافة مكتبات Firebase الضرورية لكودك لكي ينجح التجميع
          flutter pub add firebase_core cloud_firestore
          flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: crusheergram-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
